<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom - Login</title>
    <style>
        :root {
            --bg-color: #f9f7f2;
            --card-bg: #ffffff;
            --text-main: #3d3d3d;
            --text-muted: #8c8c8c;
            --accent-green: #89a386;
            --accent-hover: #768d73;
            --border-light: #eeebe3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }

        .split-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* --- LEFT SIDE: THE IMAGE/QUOTE --- */
        .visual-side {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('bg.jpg');
            background-size: cover;
            background-position: center;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .quote-container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .quote-text {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .quote-author {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* --- RIGHT SIDE: THE LOGIN FORM --- */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            padding: 40px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .brand h1 {
            font-family: 'Georgia', serif;
            font-weight: 600;
            font-size: 32px;
            color: var(--text-main);
        }

        .flower-icon { font-size: 15px; }

        h2 {
            font-family: 'Georgia', serif;
            font-size: 20px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 15px;
            border: 1.5px solid var(--border-light);
            background-color: #fafaf8;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-green);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(137, 163, 134, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background-color: var(--accent-green);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .btn-login:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(137, 163, 134, 0.3);
        }

        .footer-links {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        @media (max-width: 850px) {
            .visual-side { display: none; }
            .form-side { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="visual-side">
            <div class="quote-container">
                <p class="quote-text">"Tend to your tasks, and watch your focus bloom."</p>
                <p class="quote-author">— Anonymous</p>
            </div>
        </div>

        <div class="form-side">
            <div class="login-card">
                <div class="brand">
                    <h1>Bloom</h1>
                    <span class="flower-icon">🌸</span>
                </div>

                <h2>Start Growing</h2>
                <p class="subtitle">Log in to tend to your digital garden.</p>

                <form action="new.html">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="hello@bloom.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-login">Log in</button>
                    
                    <a href="#" class="forgot-password">Forgot password?</a>
                </form>

                <div class="footer-links">
                    <p>New here? <a href="#">Create an account</a></p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
